    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0C7E92;
            --primary-dark: #096a7b;
            --bg: #0a0a0a;
            --surface: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --radius: 16px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #fff;
            color: #111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 70px;
        }

        /* ── Layout ─────────────────────────────────────────── */
        .checkout-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 40px 20px 60px;
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        .checkout-summary {
            flex: 0 0 340px;
        }

        .checkout-form-area {
            flex: 1;
            min-width: 0;
            max-width: 560px;
        }

        /* ── Summary Card ───────────────────────────────────── */
        .summary-card {
            background: #fff;
            border: 1px solid #dde1e7;
            border-radius: var(--radius);
            padding: 28px;
            position: sticky;
            top: 94px;
        }

        .summary-card h2 {
            font-size: 18px;
            font-weight: 700;
            color: #111;
            margin-bottom: 20px;
            text-align: center;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 14px;
        }

        .summary-row + .summary-row { border-top: 1px solid var(--border); }

        .summary-label { color: #555; }

        .summary-value {
            font-weight: 600;
            color: #111;
            text-align: right;
        }

        .summary-total {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-total .label {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .summary-total .price {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
        }

        .summary-total .interval {
            font-size: 13px;
            font-weight: 400;
            color: var(--primary);
        }

        .summary-coupon {
            margin-top: 16px;
            padding: 8px 12px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            font-size: 13px;
            color: #34d399;
            font-weight: 500;
        }

        .summary-secure {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .summary-secure svg { flex-shrink: 0; color: var(--primary); }

        /* ── Checkout Mount ──────────────────────────────────── */
        .checkout-form-area h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #111;
            text-align: center;
        }

        #checkout-mount {
            min-height: 360px;
        }

        /* ── Loading / Error states ──────────────────────────── */
        .checkout-loading {
            text-align: center;
            padding: 80px 20px;
        }

        .checkout-loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .checkout-loading p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .checkout-error {
            text-align: center;
            padding: 60px 20px;
        }

        .checkout-error p {
            color: #f87171;
            font-size: 15px;
            margin-bottom: 16px;
        }

        .checkout-error a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .footer {
            color: unset;
            flex-shrink: 0;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        /* ── Responsive ──────────────────────────────────────── */
        @media (max-width: 768px) {
            .checkout-wrapper {
                flex-direction: column;
                padding: 20px 16px 40px;
                gap: 24px;
            }

            .checkout-summary {
                flex: none;
                width: 100%;
            }

            .summary-card { position: static; }

            .checkout-form-area { max-width: 100%; }
        }
    </style>
</head>

    <script>
    (async () => {
        const SUPABASE_FUNCTIONS_URL = `${SUPABASE_URL}/functions/v1`;
        const STRIPE_PUBLISHABLE_KEY = 'pk_test_51SVzEyHvzw21MS4EXQaQHLxBfqpquz46Jqb3Zc9iQ9lJ2VrJh5x8WrTZcaLqivbMhtdM5jIz8cVF82kGuRHDRCzn00IlQrYnJO';

        // ── Parse URL params ──────────────────────────────
        const params  = new URLSearchParams(window.location.search);
        const planId  = params.get('plan_id');
        const coupon  = params.get('coupon');
        const interval = params.get('interval') || 'month';
        const trialEnd = params.get('trial_end') || null;
        const revokeSubId = params.get('revoke_sub_id') || null;
        const couponDiscountType = params.get('coupon_discount_type') || null;
        const couponDiscountValue = params.get('coupon_discount_value') || null;
        const couponDuration = params.get('coupon_duration') || null;
        const couponDurationMonths = params.get('coupon_duration_months') || null;

        if (!planId) {
            showError('Nenhum plano selecionado.');
            return;
        }

        // ── Auth check ────────────────────────────────────
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            sessionStorage.setItem('checkout_plan_id', planId);
            window.location.href = 'login.html?next=planos.html';
            return;
        }

        // ── Guard: verificar perfil e assinatura ─────────
        const { data: profile } = await supabase
            .from('profiles')
            .select('free_access, subscription_tier')
            .eq('id', session.user.id)
            .single();

        if (profile?.free_access) {
            window.location.href = 'planos.html';
            return;
        }

        const { data: activeSubs } = await supabase
            .from('subscriptions')
            .select('id, cancel_at_period_end, current_period_end')
            .eq('user_id', session.user.id)
            .in('status', ['active', 'trialing'])
            .order('created_at', { ascending: false });

        const hasBlockingSub = activeSubs && activeSubs.some(s => !s.cancel_at_period_end);

        // Bloquear se há sub activa sem cancelamento pendente E não é fluxo de troca de intervalo/plano
        if (hasBlockingSub && !trialEnd && !revokeSubId) {
            window.location.href = 'planos.html';
            return;
        }

        // ── Load plan details ─────────────────────────────
        let plan = null;
        {
            const { data: p } = await supabase.from('plans').select('*').eq('id', planId).single();
            plan = p;
        }

        if (!plan) { showError('Plano não encontrado.'); return; }

        const useAnnual = interval === 'year' && plan.annual_price_brl;
        const price = useAnnual ? parseFloat(plan.annual_price_brl) : parseFloat(plan.price_brl);
        const intervalLabel = interval === 'year' ? '/ano' : '/mês';

        // ── Load coupon details if provided ───────────────
        let couponData = null;
        if (coupon) {
            const { data: couponRow } = await supabase
                .from('coupons')
                .select('discount_type, discount_value, duration, duration_in_months')
                .eq('code', coupon.toUpperCase())
                .eq('is_active', true)
                .maybeSingle();
            couponData = couponRow;
            // Fallback to URL params if DB fetch failed
            if (!couponData && couponDiscountType) {
                couponData = {
                    discount_type: couponDiscountType,
                    discount_value: couponDiscountValue,
                    duration: couponDuration,
                    duration_in_months: couponDurationMonths ? parseInt(couponDurationMonths) : null,
                };
            }
        }

        // Calculate discounted price (never negative)
        let finalPrice = price;
        let discountDisplay = null;
        if (couponData) {
            if (couponData.discount_type === 'percent') {
                const off = price * (parseFloat(couponData.discount_value) / 100);
                finalPrice = Math.max(0, price - off);
                discountDisplay = `-${couponData.discount_value}%`;
            } else {
                const off = parseFloat(couponData.discount_value);
                finalPrice = Math.max(0, price - off);
                discountDisplay = `-R$ ${Math.min(off, price).toFixed(2).replace('.', ',')}`;
            }
        }

        // ── Build coupon duration text ───────────────────
        let couponDurationText = '';
        if (couponData) {
            const dur = couponData.duration || 'once';
            const durMonths = couponData.duration_in_months;
            if (dur === 'forever') {
                couponDurationText = 'Desconto válido para sempre';
            } else if (dur === 'repeating' && durMonths) {
                couponDurationText = durMonths === 1
                    ? 'Desconto válido por 1 mês'
                    : `Desconto válido por ${durMonths} meses`;
            } else {
                couponDurationText = 'Desconto válido apenas na primeira cobrança';
            }
        }

        // Render summary
        document.getElementById('summaryContent').innerHTML = `
            <div class="summary-row">
                <span class="summary-label">Plano</span>
                <span class="summary-value">${escHtml(plan.name)}</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Cobrança</span>
                <span class="summary-value">${interval === 'year' ? 'Anual' : 'Mensal'}</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Valor</span>
                <span class="summary-value">R$ ${price.toFixed(2).replace('.', ',')}</span>
            </div>
            ${couponData ? `
            <div class="summary-row" style="color:#34d399;">
                <span>Cupom (${escHtml(coupon)})</span>
                <span style="font-weight:600;">${discountDisplay}</span>
            </div>
            ${couponDurationText ? `<div style="font-size:11px;color:rgba(52,211,153,0.7);text-align:right;margin-top:-4px;margin-bottom:8px;">${couponDurationText}</div>` : ''}
            ` : coupon ? `<div class="summary-coupon" style="background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:#f87171;">Cupom &quot;${escHtml(coupon)}&quot; não encontrado</div>` : ''}
            ${trialEnd ? `
            <div class="summary-row" style="color:#f59e0b;font-size:12px;">
                <span>Primeira cobrança em</span>
                <span style="font-weight:600;">${new Date(trialEnd).toLocaleDateString('pt-BR')}</span>
            </div>` : ''}
            <div class="summary-total">
                <span class="label">Total</span>
                <span>
                    <span class="price">R$ ${finalPrice.toFixed(2).replace('.', ',')}</span>
                    <span class="interval">${intervalLabel}</span>
                </span>
            </div>
            <div class="summary-secure">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                Pagamento seguro processado pelo Stripe
            </div>
        `;

        // ── Create checkout session (embedded) ────────────
        try {
            const res = await fetch(`${SUPABASE_FUNCTIONS_URL}/create-checkout-session`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${session.access_token}`,
                    'apikey': SUPABASE_ANON_KEY,
                },
                body: JSON.stringify({
                    plan_id: planId,
                    coupon_code: coupon || undefined,
                    billing_interval: interval,
                    ui_mode: 'embedded',
                    trial_end: trialEnd || undefined,
                    revoke_sub_id: revokeSubId || undefined,
                }),
            });

            const body = await res.json();
            if (!res.ok) throw new Error(body.error || 'Erro ao criar sessão de checkout');

            // ── Mount Stripe Embedded Checkout ─────────────
            const stripe = Stripe(STRIPE_PUBLISHABLE_KEY);
            const checkout = await stripe.initEmbeddedCheckout({
                clientSecret: body.clientSecret,
            });

            document.getElementById('checkout-mount').innerHTML = '';
            checkout.mount('#checkout-mount');

        } catch (err) {
            showError(err.message);
        }

        // ── Helpers ────────────────────────────────────────
        function showError(msg) {
            document.getElementById('checkout-mount').innerHTML = `
                <div class="checkout-error">
                    <p>${escHtml(msg)}</p>
                    <a href="planos.html">Voltar aos planos</a>
                </div>`;
        }

        function escHtml(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }
    })();
    </script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('user-account-btn-co');
    var dropdown = document.getElementById('user-dropdown-co');
    var logoutBtn = document.getElementById('logout-btn-co');
    if (btn && dropdown) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            // Close hamburger menu first (same as other pages)
            var mt = document.querySelector('.menu-toggle');
            var nv = document.querySelector('.nav');
            var mo = document.querySelector('.menu-overlay');
            if (mt && nv && nv.classList.contains('active')) {
                mt.classList.remove('active');
                nv.classList.remove('active');
                if (mo) mo.classList.remove('active');
                document.body.classList.remove('menu-open');
            }
            dropdown.classList.toggle('active');
        });
        document.addEventListener('click', function() {
            dropdown.classList.remove('active');
        });
    }
    if (logoutBtn) {
        logoutBtn.addEventListener('click', async function() {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        });
    }

    // ── Notifications, popup, blocked overlay & realtime ─────
    (async function() {
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) return;
            const userId = session.user.id;

            let profile = null;
            try { const { data } = await supabase.from('profiles').select('*').eq('id', userId).maybeSingle(); profile = data; } catch(_){}

            // ── Blocked overlay ─────────────────────────────
            if (profile?.is_blocked) {
                renderBlockedOverlay(userId);
            }

            // ── Realtime: block/unblock + subscriptions ─────
            supabase.channel('checkout-profile-block-' + userId)
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'profiles',
                    filter: `id=eq.${userId}`
                }, payload => {
                    const np = payload.new;
                    if (!np) return;
                    if (np.is_blocked && !profile?.is_blocked) renderBlockedOverlay(userId);
                    else if (!np.is_blocked && profile?.is_blocked) {
                        const ov = document.getElementById('blockedOverlay');
                        if (ov) ov.remove();
                    }
                    profile = { ...profile, ...np };
                })
                .subscribe();

            // ── Notifications: badge + popup ───────────────
            checkAdminNotifications(userId, profile);

            // ── Realtime: new notifications ─────────────────
            supabase.channel('checkout-notif-realtime-' + userId)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'admin_notifications'
                }, async (payload) => {
                    const n = payload.new;
                    if (!n || !n.is_active) return;
                    if (document.getElementById('notifPopupOverlay')) return;

                    let applies = false;
                    if (n.target_type === 'all') applies = true;
                    else if (n.target_type === 'role') {
                        const r = profile?.role || 'user';
                        applies = (n.target_roles || []).some(t => t === r || (t === 'admin' && r === 'super_admin'));
                    }
                    else if (n.target_type === 'tier' || n.target_type === 'plan') {
                        const tier = profile?.subscription_tier || 'free';
                        let planId = null;
                        try {
                            const { data: sub } = await supabase.from('subscriptions').select('plan_id')
                                .eq('user_id', userId).in('status', ['active','trialing'])
                                .order('created_at',{ascending:false}).limit(1).maybeSingle();
                            planId = sub?.plan_id || null;
                        } catch(_){}
                        if (!planId) {
                            if (profile?.free_access && profile?.free_access_plan_id) planId = profile.free_access_plan_id;
                            else { try { const { data: fp } = await supabase.from('plans').select('id').eq('is_free', true).eq('is_active', true).maybeSingle(); if (fp) planId = fp.id; } catch(_) {} }
                        }
                        applies = (n.target_tiers || []).some(t => t === tier || (planId && t === planId));
                    }
                    else if (n.target_type === 'specific') applies = (n.target_user_ids || []).includes(userId);

                    if (applies && n.show_popup !== false) showNotificationPopup([n], userId, () => checkAdminNotifications(userId, profile).catch(()=>{}));
                })
                .subscribe();

        } catch(_) { /* silent */ }
    })();

    async function checkAdminNotifications(userId, profile) {
        try {
            const { data: notifications, error: nErr } = await supabase.from('admin_notifications').select('*').eq('is_active', true).order('created_at', { ascending: true });
            if (nErr) return;
            if (!notifications || notifications.length === 0) { updateNotifBadge(0); return; }

            let resolvedPlanId = null;
            try { const { data: sub } = await supabase.from('subscriptions').select('plan_id').eq('user_id', userId).in('status', ['active','trialing']).order('created_at',{ascending:false}).limit(1).maybeSingle(); resolvedPlanId = sub?.plan_id || null; } catch(_){}
            if (!resolvedPlanId) {
                if (profile?.free_access && profile?.free_access_plan_id) resolvedPlanId = profile.free_access_plan_id;
                else { try { const { data: fp } = await supabase.from('plans').select('id').eq('is_free', true).eq('is_active', true).maybeSingle(); if (fp) resolvedPlanId = fp.id; } catch(_) {} }
            }

            const { data: reads } = await supabase.from('notification_reads').select('notification_id').eq('user_id', userId);
            const readIds = new Set((reads || []).map(r => r.notification_id));

            const unread = notifications.filter(n => {
                if (readIds.has(n.id)) return false;
                if (n.target_type === 'all') return true;
                if (n.target_type === 'role') { const r = profile?.role || 'user'; return (n.target_roles || []).some(t => t === r || (t === 'admin' && r === 'super_admin')); }
                if (n.target_type === 'tier' || n.target_type === 'plan') { const tier = profile?.subscription_tier || 'free'; return (n.target_tiers || []).some(t => t === tier || (resolvedPlanId && t === resolvedPlanId)); }
                if (n.target_type === 'specific') return (n.target_user_ids || []).includes(userId);
                return false;
            });

            if (unread.length === 0) { updateNotifBadge(0); return; }
            updateNotifBadge(unread.length);
            const popupNotifs = unread.filter(n => n.show_popup !== false);
            if (popupNotifs.length > 0) showNotificationPopup(popupNotifs, userId, () => checkAdminNotifications(userId, profile).catch(()=>{}));
        } catch(_){}
    }

    function updateNotifBadge(count) {
        const avatar = document.querySelector('.user-avatar');
        if (avatar) { let b = avatar.querySelector('.notif-badge'); if (count > 0) { if (!b) { b = document.createElement('span'); b.className = 'notif-badge'; avatar.appendChild(b); } b.textContent = count > 99 ? '99+' : count; } else if (b) b.remove(); }
        const nl = document.querySelector('a.user-dropdown-item[href="notificacoes.html"]');
        if (nl) { let d = nl.querySelector('.notif-dropdown-count'); if (count > 0) { if (!d) { d = document.createElement('span'); d.className = 'notif-dropdown-count'; d.style.cssText = 'margin-left:auto;background:#ef4444;color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;'; nl.appendChild(d); } d.textContent = count > 99 ? '99+' : count; } else if (d) d.remove(); }
    }

    function showNotificationPopup(notifications, userId, onAllDismissed) {
        let current = 0;
        const overlay = document.createElement('div');
        overlay.id = 'notifPopupOverlay';

        function closePopup() {
            // Marca a notificação atual como lida para não reaparecer como popup
            supabase.from('notification_reads').insert({ user_id: userId, notification_id: notifications[current].id }).catch(() => {});
            overlay.remove();
            if (onAllDismissed) onAllDismissed();
        }
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:99999;display:flex;align-items:center;justify-content:center;padding:16px;';
        function render() {
            const n = notifications[current];
            const isLast = current === notifications.length - 1;
            overlay.innerHTML = `
                <div style="background:#1a1a1a;border:1px solid rgba(12,126,146,.4);border-radius:18px;padding:32px;width:480px;max-width:calc(100vw - 32px);box-shadow:0 24px 80px rgba(0,0,0,.7);max-height:85svh;overflow-y:auto;position:relative;">
                    <button id="notifCloseBtn" style="position:absolute;top:12px;right:14px;background:none;border:none;color:#666;font-size:22px;cursor:pointer;line-height:1;padding:2px 6px;" title="Fechar">&times;</button>
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px;padding-right:28px;">
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div style="width:36px;height:36px;border-radius:50%;background:rgba(12,126,146,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0C7E92" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                            </div>
                            <h3 style="font-family:Poppins,sans-serif;font-size:16px;font-weight:600;color:#fff;margin:0;word-break:break-word;">${n.title.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</h3>
                        </div>
                        ${notifications.length > 1 ? `<span style="font-size:12px;color:#666;flex-shrink:0;">${current+1} / ${notifications.length}</span>` : ''}
                    </div>
                    <p style="font-family:Poppins,sans-serif;font-size:14px;color:#aaa;line-height:1.65;white-space:pre-wrap;word-break:break-word;margin:0 0 24px;">${n.message.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>
                    <div style="display:flex;justify-content:flex-end;">
                        <button id="notifDismissBtn" style="background:#0C7E92;color:#fff;border:none;border-radius:10px;padding:10px 24px;font-family:Poppins,sans-serif;font-size:14px;font-weight:500;cursor:pointer;">
                            ${isLast ? 'Entendido' : 'Próxima →'}
                        </button>
                    </div>
                </div>`;
            overlay.querySelector('#notifCloseBtn').onclick = () => closePopup();
            overlay.querySelector('#notifDismissBtn').onclick = async () => {
                await supabase.from('notification_reads').insert({ user_id: userId, notification_id: n.id }).then(() => {});
                current++;
                if (current < notifications.length) render();
                else {
                    overlay.remove();
                    if (onAllDismissed) onAllDismissed();
                }
            };
        }
        document.body.appendChild(overlay);
        render();
    }

    async function renderBlockedOverlay(userId) {
        let waUrl = 'https://wa.link/m1vm4f';
        try {
            const { data } = await supabase.from('site_settings').select('value').eq('key', 'phone').maybeSingle();
            if (data?.value) { const p = String(data.value).replace(/\D/g, ''); if (p) waUrl = `https://wa.me/${p}?text=${encodeURIComponent('Olá! Minha conta na Light Marketing foi bloqueada. Gostaria de entender o motivo e saber como resolver. Obrigado!')}`; }
        } catch(_){}
        if (document.getElementById('blockedOverlay')) return;
        const ov = document.createElement('div');
        ov.id = 'blockedOverlay';
        ov.style.cssText = 'position:fixed;inset:0;top:70px;z-index:9999;background:rgba(13,16,20,0.95);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;';
        ov.innerHTML = `<div style="text-align:center;max-width:420px;padding:32px;">
            <div style="width:56px;height:56px;border-radius:50%;background:rgba(12,126,146,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="10" rx="2" stroke="#0C7E92" stroke-width="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#0C7E92" stroke-width="2" stroke-linecap="round"/></svg>
            </div>
            <h3 style="font-family:Poppins,sans-serif;font-size:18px;font-weight:600;color:#fff;margin:0 0 8px;">Conta temporariamente bloqueada</h3>
            <p style="font-family:Poppins,sans-serif;font-size:14px;color:#aaa;margin:0 0 24px;">Entre em contato com o suporte para mais informações.</p>
            <a href="${waUrl}" target="_blank" rel="noopener noreferrer" style="display:inline-block;background:#0C7E92;color:#fff;text-decoration:none;border-radius:10px;padding:10px 24px;font-family:Poppins,sans-serif;font-size:14px;font-weight:500;">Falar com suporte</a>
        </div>`;
        document.body.appendChild(ov);
    }
});
</script>
<script src="script.js"></script>
</body>
</html>
